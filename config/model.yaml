model_selection:
  model:

    Linear Regression:
      search_param_grid:
        fit_intercept: [True]

    Ridge Regression:
      search_param_grid:
        alpha: [0.1, 1.0, 10]

    Lasso Regression:
      search_param_grid:
        alpha: [0.001, 0.01, 0.1]

    Random Forest Regression:
      search_param_grid:
        n_estimators: [20, 50]
        max_depth: [10, 20]
        min_samples_split: [2]

    Gradient Boosting Regression:
      search_param_grid:
        n_estimators: [50, 100]
        max_depth: [2, 3]
        learning_rate: [0.05, 0.1]

    DecisionTree Regressor:
      search_param_grid:
        criterion: ["squared_error"]
        splitter: ["best"]
        max_depth: [5, 10]
