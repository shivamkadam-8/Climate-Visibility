{% extends "base.html" %}

{% block title %}Login | Climate Visibility{% endblock %}

{% block content %}

<style>
body {
    background-image: url("{{ url_for('static', filename='image/images.jpg') }}");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;
    height: 100vh;
    margin: 0;
}

/* Card styling */
.form-card {
    background: white;
    padding: 45px;
    border-radius: 25px;
    width: 100%;
    max-width: 420px;
    margin: 100px auto 40px auto;
    box-shadow: 0px 15px 35px rgba(0,0,0,0.25);
    animation: fadeIn 0.8s ease-in-out;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

h3 {
    text-align: center;
    margin-bottom: 35px;
    font-weight: 700;
    color: #333;
}

/* Inputs */
.form-control {
    border-radius: 15px;
    height: 55px;
    padding: 10px;
    border: 1px solid #ccc;
    transition: border-color 0.2s ease, box-shadow 0.2s ease;
}

.form-control:focus {
    border-color: #2c73df;
    box-shadow: 0 0 6px rgba(44,115,223,0.4);
}

/* Button */
.btn-login {
    width: 100%;
    background: linear-gradient(135deg, #2c73df, #1e4bb8);
    color: white;
    border: none;
    height: 55px;
    border-radius: 30px;
    font-size: 18px;
    font-weight: 600;
    transition: all 0.3s ease;
}

.btn-login:hover {
    transform: scale(1.05);
    box-shadow: 0px 10px 25px rgba(44,115,223,0.4);
}

/* Links */
.text-center a {
    color: #2c73df;
    text-decoration: none;
    transition: color 0.3s ease;
}

.text-center a:hover {
    color: #1e4bb8;
}
</style>

<div class="form-card">

    <h3>Login</h3>

    <form method="POST">

        <div class="mb-3">
            <label class="form-label fw-semibold">Email</label>
            <input type="email" name="email" class="form-control" placeholder="Enter your email" required>
        </div>

        <div class="mb-3">
            <label class="form-label fw-semibold">Password</label>
            <input type="password" name="password" class="form-control" placeholder="Enter password" required>
        </div>

        <button type="submit" class="btn-login">
            Login
        </button>

        <div class="text-center mt-3">
            <a href="/forgot-password">Forgot Password?</a>
        </div>

        <div class="text-center mt-2">
            Don't have an account?
            <a href="/register" class="fw-semibold">Sign Up</a>
        </div>

    </form>
</div>

{% endblock %}
