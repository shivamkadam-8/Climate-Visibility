<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Prediction Result</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #74ebd5, #9face6);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            padding: 45px 35px;
            border-radius: 25px;
            width: 420px;
            text-align: center;
            box-shadow: 0px 15px 35px rgba(0,0,0,0.25);
            animation: fadeIn 0.8s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            margin-bottom: 25px;
            font-size: 26px;
            color: #333;
        }

        .sun {
            font-size: 34px;
            margin-right: 8px;
        }

        .prediction-box {
            background: linear-gradient(135deg, #00ff2a, #3cff00);
            padding: 20px;
            border-radius: 18px;
            margin: 25px 0;
        }

        .prediction {
            font-size: 36px;
            font-weight: 700;
            color: #2c2c2c;
        }

        .unit {
            font-size: 18px;
            font-weight: 500;
            color: #444;
        }

        .btn-home {
            margin-top: 30px;
            display: inline-block;
            padding: 14px 34px;
            background: linear-gradient(135deg, #dfd32c, #ebc20b);
            color: white;
            text-decoration: none;
            border-radius: 35px;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-home:hover {
            transform: scale(1.05);
            box-shadow: 0px 8px 20px rgba(44,115,223,0.4);
        }

        .footer-text {
            margin-top: 15px;
            font-size: 13px;
            color: #777;
        }
    </style>
</head>

<body>

<div class="card">

    <h1>
        <span class="sun">☀️</span>
        Climate Visibility
    </h1>

    <div class="prediction-box">
        <div class="prediction">
            {{ prediction }}
            <span class="unit">km</span>
        </div>
    </div>

    <a href="/" class="btn-home">⬅ Go Back to Home</a>

    <div class="footer-text">
        ML Based Climate Prediction System 🌍
    </div>

</div>

</body>
</html>
