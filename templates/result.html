<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Prediction Result</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #74ebd5, #9face6);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.card {
    background: white;
    padding: 45px 35px;
    border-radius: 25px;
    width: 420px;
    text-align: center;
    box-shadow: 0px 15px 35px rgba(0,0,0,0.25);
    animation: fadeIn 0.8s ease-in-out;
}

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

h1 {
    margin-bottom: 25px;
    font-size: 26px;
    color: #333;
}

.sun {
    font-size: 34px;
    margin-right: 8px;
}

.prediction-box {
    background: linear-gradient(135deg, #00ff2a, #3cff00);
    padding: 20px;
    border-radius: 18px;
    margin: 25px 0;
}

.prediction {
    font-size: 36px;
    font-weight: 700;
    color: #2c2c2c;
}

.unit {
    font-size: 18px;
    font-weight: 500;
    color: #444;
}

.btn-home {
    margin-top: 20px;
    display: inline-block;
    padding: 14px 34px;
    background: linear-gradient(135deg, #dfd32c, #ebc20b);
    color: white;
    text-decoration: none;
    border-radius: 35px;
    font-size: 16px;
    font-weight: 600;
    transition: all 0.3s ease;
}

.btn-home:hover {
    transform: scale(1.05);
    box-shadow: 0px 8px 20px rgba(44,115,223,0.4);
}

.btn-report {
    margin-top: 15px;
    padding: 12px 28px;
    background: linear-gradient(135deg, #3498db, #6dd5fa);
    border: none;
    color: white;
    border-radius: 30px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
}

.btn-report:hover {
    transform: scale(1.05);
    box-shadow: 0px 6px 18px rgba(0,0,0,0.25);
}

/* NEW HISTORY BUTTON STYLE */
.btn-history {
    display: inline-block;
    margin-top: 15px;
    padding: 12px 28px;
    background: linear-gradient(135deg, #ff7e5f, #feb47b);
    color: white;
    border-radius: 30px;
    font-size: 15px;
    font-weight: 600;
    text-decoration: none;
    transition: 0.3s ease;
}

.btn-history:hover {
    transform: scale(1.05);
    box-shadow: 0px 6px 18px rgba(0,0,0,0.25);
}

.footer-text {
    margin-top: 15px;
    font-size: 13px;
    color: #777;
}

</style>

</head>

<body>

<div class="card">

<h1>
<span class="sun">☀️</span>
Climate Visibility
</h1>

<div class="prediction-box">
<div class="prediction">
{{ prediction }}
<span class="unit">km</span>
</div>
</div>

<!-- FULL REPORT FORM -->
<form action="/full-report" method="POST">

<input type="hidden" name="temperature" value="{{temperature}}">
<input type="hidden" name="humidity" value="{{humidity}}">
<input type="hidden" name="wind_speed" value="{{wind_speed}}">
<input type="hidden" name="wind_direction" value="{{wind_direction}}">
<input type="hidden" name="pressure" value="{{pressure}}">
<input type="hidden" name="prediction" value="{{prediction}}">

<button type="submit" class="btn-report">📊 View Full Report</button>

</form>

<br>

<a href="/history" class="btn-history">📊 View Prediction History</a>

<br>

<a href="/" class="btn-home">⬅ Go Back to Home</a>

<div class="footer-text">
ML Based Climate Prediction System 🌍
</div>

</div>

</body>
</html>
